<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Recommender</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="form-panel" aria-labelledby="page-title">
        <h1 id="page-title">Paper Recommender</h1>
        <p id="index-status" class="index-status">Index status unavailable</p>
        <form id="recommend-form">
          <label for="url">arXiv URL</label>
          <input
            id="url"
            name="url"
            type="url"
            placeholder="https://arxiv.org/abs/1706.03762"
            required
          />

          <div class="filters">
            <div>
              <label for="category-search">Category</label>
              <div class="category-picker">
                <input
                  id="category-search"
                  type="search"
                  placeholder="Search categories"
                  autocomplete="off"
                />
                <div
                  id="selected-categories"
                  class="selected-categories"
                  aria-live="polite"
                ></div>
                <div
                  id="category-options"
                  class="category-options"
                  role="group"
                  aria-label="Categories"
                ></div>
              </div>
            </div>
            <div>
              <label>Date range</label>
              <div class="date-range">
                <input id="date-from" name="date_from" type="date" aria-label="Start date" />
                <input id="date-to" name="date_to" type="date" aria-label="End date" />
              </div>
            </div>
          </div>

          <button type="submit">Find similar papers</button>
        </form>
      </section>

      <section class="results-panel" aria-labelledby="results-title">
        <h2 id="results-title">Similar papers</h2>
        <p id="status" class="status">No results</p>
        <ol id="results" class="results"></ol>
      </section>
    </main>

    <template id="result-template">
      <li class="result">
        <div class="result-header">
          <strong class="paper-id"></strong>
          <span class="score"></span>
        </div>
        <p class="meta"></p>
        <a class="arxiv-link" target="_blank" rel="noreferrer">Open on arXiv</a>
      </li>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
