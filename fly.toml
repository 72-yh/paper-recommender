app = "paper-recommender-72yh"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PAPER_RECOMMENDER_DB_PATH = "/app/data/paper_recommender_1m.db"
  PAPER_RECOMMENDER_INDEX_PATH = "/app/data/vectors_1m_int8_mmap"
  PAPER_RECOMMENDER_INDEX_KIND = "int8_mmap"

[[mounts]]
  source = "paper_recommender_data"
  destination = "/app/data"
  initial_size = "2GB"
  scheduled_snapshots = false

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  soft_limit = 10
  hard_limit = 20

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
